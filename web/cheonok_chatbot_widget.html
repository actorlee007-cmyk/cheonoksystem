<!-- CHEONOK Homepage Chatbot Widget v0.1 -->
<!-- Paste this before </body> of the landing page. -->
<style>
  #cheonok-chatbot-button {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 64px;
    height: 64px;
    border-radius: 999px;
    border: none;
    background: #111827;
    color: #bbf7d0;
    font-weight: 800;
    box-shadow: 0 12px 36px rgba(0,0,0,0.28);
    cursor: pointer;
    z-index: 999999;
  }
  #cheonok-chatbot-panel {
    position: fixed;
    right: 22px;
    bottom: 96px;
    width: min(390px, calc(100vw - 32px));
    max-height: min(660px, calc(100vh - 130px));
    background: #07111f;
    color: #e5e7eb;
    border: 1px solid #1f2937;
    border-radius: 18px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.36);
    overflow: hidden;
    display: none;
    z-index: 999999;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }
  #cheonok-chatbot-panel.open { display: flex; flex-direction: column; }
  .cheonok-chat-head {
    padding: 16px;
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
  }
  .cheonok-chat-head strong { color: #bbf7d0; display: block; font-size: 16px; }
  .cheonok-chat-head span { color: #cbd5e1; display: block; font-size: 13px; margin-top: 4px; line-height: 1.35; }
  .cheonok-chat-body { padding: 14px; overflow-y: auto; }
  .cheonok-msg {
    padding: 10px 12px;
    margin: 8px 0;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .cheonok-bot { background: #111827; color: #e5e7eb; }
  .cheonok-user { background: #bbf7d0; color: #052e16; margin-left: 36px; }
  .cheonok-buttons { display: grid; gap: 8px; margin-top: 10px; }
  .cheonok-buttons button {
    background: #1e293b;
    border: 1px solid #334155;
    color: #f8fafc;
    border-radius: 12px;
    padding: 10px;
    text-align: left;
    cursor: pointer;
    font-size: 13px;
  }
  .cheonok-buttons button:hover { background: #334155; }
  .cheonok-chat-form {
    border-top: 1px solid #1f2937;
    padding: 12px;
    display: grid;
    gap: 8px;
    background: #020617;
  }
  .cheonok-chat-form textarea,
  .cheonok-chat-form input {
    width: 100%;
    box-sizing: border-box;
    border-radius: 12px;
    border: 1px solid #334155;
    padding: 10px;
    background: #0f172a;
    color: #e5e7eb;
    outline: none;
    font-size: 13px;
  }
  .cheonok-chat-form button {
    background: #86efac;
    color: #052e16;
    border: none;
    border-radius: 12px;
    padding: 11px;
    font-weight: 800;
    cursor: pointer;
  }
  .cheonok-small { font-size: 12px; color: #94a3b8; line-height: 1.35; }
</style>

<button id="cheonok-chatbot-button" type="button">문의</button>

<div id="cheonok-chatbot-panel" aria-live="polite">
  <div class="cheonok-chat-head">
    <strong>CHEONOK 상담/무료진단</strong>
    <span>링크·아이디어·불편함을 보내면 시장 신호와 다음 실행 방향을 정리합니다.</span>
  </div>
  <div class="cheonok-chat-body" id="cheonok-chat-body"></div>
  <div class="cheonok-chat-form">
    <textarea id="cheonok-chat-input" rows="3" placeholder="분석할 링크, 아이디어, 해결하고 싶은 불편함을 적어주세요."></textarea>
    <input id="cheonok-chat-contact" placeholder="연락처 선택 입력: 이메일/텔레그램/카카오" />
    <button id="cheonok-chat-submit" type="button">무료진단 문의 남기기</button>
    <div class="cheonok-small">카드번호, 계좌 비밀번호, 증권사 비밀번호는 입력하지 마세요. 실전 주문은 차단되어 있습니다.</div>
  </div>
</div>

<script>
(function(){
  const button = document.getElementById('cheonok-chatbot-button');
  const panel = document.getElementById('cheonok-chatbot-panel');
  const body = document.getElementById('cheonok-chat-body');
  const input = document.getElementById('cheonok-chat-input');
  const contact = document.getElementById('cheonok-chat-contact');
  const submit = document.getElementById('cheonok-chat-submit');

  const answers = {
    service: `CHEONOK은 SNS·유튜브·뉴스·깃허브·이미지·아이디어를 받아서\n사람들이 왜 반응하는지, 어떤 불편함이 숨어 있는지, 돈이 되는 구조가 있는지, 콘텐츠·상품·홈페이지·자동화로 어떻게 바꿀지 정리해주는 AI 시장 신호 분석 OS입니다.`,
    free: `무료진단은 링크나 아이디어 1개를 기준으로 핵심 신호, 불편함, 위험 요소, PASS/HOLD/BLOCK, 다음 실행을 간단히 확인하는 단계입니다.\n아래 입력창에 링크 또는 아이디어를 남겨주세요.`,
    price: `구독제는 Free / Starter / Pro / CEO 구조로 준비합니다.\nFree: 샘플/1회 진단\nStarter: 월간 소셜 신호 리포트\nPro: 주간/일간 리포트 + 콘텐츠/상품화 제안\nCEO: 맞춤형 CEO 보고서 + 시스템 패치 후보\n결제는 카드정보를 챗봇에 입력하지 않고 안전한 외부 결제 링크로 진행합니다.`,
    link: `유튜브, 틱톡, 스레드, 뉴스, 깃허브, 이미지 캡처, 아이디어 메모를 넣을 수 있습니다.\n결과는 핵심 신호, 대중 욕망, 불편함, 상품화 방향, 다음 실행 3개로 정리됩니다.`,
    pain: `해결하고 싶은 불편함을 적어주세요.\n예: 자료는 많은데 정리가 안 된다 / 구독제를 만들고 싶은데 사용법을 설명하기 어렵다 / 좋은 아이디어를 봐도 상품화가 안 된다.\nCHEONOK은 불편함 강도, 반복 빈도, 대중성, 행동 수 감소 가능성을 기준으로 상품화 후보를 봅니다.`,
    safety: `주식 관련 실전 주문과 자본 확대는 차단되어 있습니다.\nLIVE_TRADE: BLOCKED\nCAPITAL_SCALE: BLOCKED\nKIS_ORDER_GATE: BLOCKED\n현재는 PAPER 데이터 축적, 시뮬레이션, 리포트, 후보 분석 중심입니다.`
  };

  function addMsg(text, who='bot') {
    const div = document.createElement('div');
    div.className = 'cheonok-msg ' + (who === 'user' ? 'cheonok-user' : 'cheonok-bot');
    div.textContent = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function addMenu() {
    const box = document.createElement('div');
    box.className = 'cheonok-buttons';
    [
      ['이 서비스가 뭔가요?', 'service'],
      ['무료진단 받기', 'free'],
      ['구독/가격 보기', 'price'],
      ['내 링크 분석하기', 'link'],
      ['해결하고 싶은 불편함 남기기', 'pain'],
      ['주식 시스템 안전 기준', 'safety']
    ].forEach(([label, key]) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = label;
      b.onclick = () => { addMsg(label, 'user'); addMsg(answers[key], 'bot'); };
      box.appendChild(b);
    });
    body.appendChild(box);
  }

  function init() {
    if (body.dataset.ready) return;
    body.dataset.ready = '1';
    addMsg('좋은 링크나 아이디어가 있는데 어떻게 돈 되는 구조로 바꿀지 막히셨나요?\n링크, 아이디어, 불편함 중 하나를 보내주세요. CHEONOK이 핵심 신호와 다음 실행을 정리해드립니다.');
    addMenu();
  }

  button.onclick = () => {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) init();
  };

  submit.onclick = () => {
    const text = input.value.trim();
    const c = contact.value.trim();
    if (!text) { addMsg('분석할 링크, 아이디어, 불편함 중 하나를 먼저 적어주세요.'); return; }
    addMsg(text, 'user');

    const lead = {
      created_at: new Date().toISOString(),
      message: text,
      contact: c,
      source: 'homepage_chatbot_widget_v01'
    };
    const leads = JSON.parse(localStorage.getItem('cheonok_leads') || '[]');
    leads.push(lead);
    localStorage.setItem('cheonok_leads', JSON.stringify(leads));

    addMsg('접수했습니다.\n다음 단계에서는 이 내용을 기준으로 무료진단 리포트 또는 구독 상담으로 연결합니다.\n현재 데모 위젯은 브라우저에 임시 저장되며, 운영 시 서버/구글폼/CRM/결제 링크와 연결됩니다.');
    input.value = '';
  };
})();
</script>
