name: JOS Paper Capital Loop

on:
  push:
    branches: [main]
    paths:
      - 'automation/python_paper_capital_runtime/JOS_MASTER.py'
      - '.github/workflows/jos_paper_capital_loop.yml'
  workflow_dispatch:
  schedule:
    # 09:00-15:00 KST (UTC+9), Mon-Fri = Korean market (KRX) trading hours
    - cron: '0 0-6 * * 1-5'

permissions:
  contents: read

concurrency:
  group: jos-paper-capital-loop
  cancel-in-progress: false

jobs:
  paper-capital:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance feedparser

      - name: Run JOS Master (single pass, PAPER_ONLY)
        env:
          CHEONOK_TELEGRAM_BOT_TOKEN: ${{ secrets.CHEONOK_TELEGRAM_BOT_TOKEN }}
          CHEONOK_TELEGRAM_CHAT_ID: ${{ secrets.CHEONOK_TELEGRAM_CHAT_ID }}
        run: python automation/python_paper_capital_runtime/JOS_MASTER.py --once
