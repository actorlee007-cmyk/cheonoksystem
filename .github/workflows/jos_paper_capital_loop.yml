name: JOS Paper Capital Loop

on:
  push:
    branches: [main]
    paths:
      - 'automation/python_paper_capital_runtime/JOS_MASTER.py'
      - '.github/workflows/jos_paper_capital_loop.yml'
  workflow_dispatch:
  schedule:
    # 08:00-20:00 KST (UTC+9), Mon-Fri = canon Layer 3 (08:00-20:00 SNAPSHOT) window
    # 09:00-20:00 KST = UTC 00:00-11:00, Mon-Fri
    - cron: '0 0-11 * * 1-5'
    # 08:00 KST = UTC 23:00 previous day, i.e. UTC Sun-Thu (weekdays 0-4)
    - cron: '0 23 * * 0-4'

permissions:
  contents: write

concurrency:
  group: jos-paper-capital-loop
  cancel-in-progress: false

jobs:
  paper-capital:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance feedparser

      - name: Run JOS Master (single pass, PAPER_ONLY)
        env:
          CHEONOK_TELEGRAM_BOT_TOKEN: ${{ secrets.CHEONOK_TELEGRAM_BOT_TOKEN }}
          CHEONOK_TELEGRAM_CHAT_ID: ${{ secrets.CHEONOK_TELEGRAM_CHAT_ID }}
          # Optional (Layer 4: KIS REAL DATA BRIDGE, .KS tickers only,
          # read-only quote endpoint). If unset, falls back to yfinance
          # with HOLD_KIS_SECRETS_MISSING.
          CHEONOK_KIS_APP_KEY: ${{ secrets.CHEONOK_KIS_APP_KEY }}
          CHEONOK_KIS_APP_SECRET: ${{ secrets.CHEONOK_KIS_APP_SECRET }}
        run: python automation/python_paper_capital_runtime/JOS_MASTER.py --once

      - name: Commit ledger updates
        if: always()
        run: |
          git config user.name "cheonok-bot"
          git config user.email "cheonok-bot@example.com"
          git add automation/python_paper_capital_runtime/ledger || true
          git commit -m "jos paper capital: ledger update (intraday)" || echo "No ledger changes"
          git push || echo "Push skipped"
