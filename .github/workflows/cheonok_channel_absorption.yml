name: CHEONOK Channel Absorption Engine

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'YouTube channel URL to absorb'
        required: false
        default: 'https://www.youtube.com/@jocoding/videos'
      limit:
        description: 'Max videos to index'
        required: false
        default: '80'
  schedule:
    - cron: '30 1 * * *'

jobs:
  absorb-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          python -m pip install yt-dlp

      - name: Run channel absorption
        env:
          CHEONOK_CHANNEL_URL: ${{ github.event.inputs.channel_url || 'https://www.youtube.com/@jocoding/videos' }}
          CHEONOK_CHANNEL_LIMIT: ${{ github.event.inputs.limit || '80' }}
          CHEONOK_TELEGRAM_BOT_TOKEN: ${{ secrets.CHEONOK_TELEGRAM_BOT_TOKEN }}
          CHEONOK_TELEGRAM_CHAT_ID: ${{ secrets.CHEONOK_TELEGRAM_CHAT_ID }}
        run: |
          python cloud_runtime/cheonok_youtube_channel_absorber.py

      - name: Upload absorption artifact
        uses: actions/upload-artifact@v4
        with:
          name: jocoding-channel-absorption
          path: _channel_absorption/
