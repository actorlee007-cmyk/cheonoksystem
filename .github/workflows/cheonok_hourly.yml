name: CHEONOK Hourly

on:
  push:
    branches: [main]
    paths:
      - 'scripts/cheonok_hourly_report.js'
      - '.github/workflows/cheonok_hourly.yml'
      - 'CHEONOK_FORCE_RUN.md'
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run CHEONOK hourly report
        run: node scripts/cheonok_hourly_report.js
      - name: Commit generated report
        run: |
          git config user.name cheonok-bot
          git config user.email cheonok-bot@example.com
          git add reports/hourly || true
          git commit -m "hourly report" || echo "No report changes"
          git push || echo "Push skipped"
